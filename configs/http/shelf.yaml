framework: shelf
projectPath: frameworks/shelf
version: 1.4.2
description: A model for web server middleware that encourages composition and easy reuse. 
publisher: dart.dev
publisherUrl: https://dart.dev
repository: https://github.com/dart-lang/shelf/tree/master/pkgs/shelf
homepage: https://github.com/dart-lang/shelf/tree/master/pkgs/shelf
build:
  command: dart
  args: ["compile", "exe", "bin/shelf_bench.dart", "-o", "bin/server.exe"]
run:
  command: bin/server.exe
  env:
    PORT: 8081
http:
  baseUrl: http://127.0.0.1:8081
  endpoint: /api/echo
  waitForReady:
    path: /health
    timeoutSeconds: 10
    intervalMillis: 200
load:
  warmupSeconds: 3
  durationSeconds: 15
  concurrency: 32
  connections: 0          # unthrottled unless you set it
  requests: 0             # duration-based
  timeoutSeconds: 5
  headers:
    - "Content-Type: application/json"
  body: '{"hello":"world"}'
oha:
  binaryPath: oha
  extraArgs: []