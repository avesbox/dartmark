framework: relic
projectPath: frameworks/relic
description: A lightweight and flexible web server inspired by Shelf for building APIs and backend services.
publisher: serverpod.dev
publisherUrl: https://serverpod.dev
version: 1.2.0
homepage: https://serverpod.dev
repository: https://github.com/serverpod/relic
build:
  command: dart
  args: ["compile", "exe", "bin/relic_bench.dart", "-o", "bin/server.exe"]
run:
  command: bin/server.exe
  env:
    PORT: 8081
http:
  baseUrl: http://127.0.0.1:8081
  endpoint: /api/echo
  waitForReady:
    path: /health
    timeoutSeconds: 10
    intervalMillis: 200
load:
  warmupSeconds: 3
  durationSeconds: 15
  concurrency: 8
  connections: 0          # unthrottled unless you set it
  requests: 0             # duration-based
  timeoutSeconds: 5
  headers:
    - "Content-Type: application/json"
  body: '{"hello":"world"}'
oha:
  binaryPath: oha
  extraArgs: []